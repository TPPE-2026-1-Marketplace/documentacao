# Project information
site_name: DK Fashion - Documentação # Nome que aparece no canto superior direito
site_url: https://TPPE-2026-1-Marketplace.github.io/documentacao
site_description: >-
  Documentação destinada para o projeto de TPPE

# Repository
repo_name: TPPE-2026-1-Marketplace/documentacao
repo_url: https://github.com/TPPE-2026-1-Marketplace/documentacao


# Configuration
theme:
  name: material
  features:
    - announce.dismiss
    # - content.action.edit
    # - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    - content.footnote.tooltips
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  
  # Material theme configuration
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Preferência do sistema
  font:
    text: Ubuntu 
    code: Ubuntu Mono
  favicon: assets/logo.png
  logo: assets/logo.png

# Plugins
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'


markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - footnotes
# Page tree
nav:
  - Home: index.md
  - Entregas: releases.md
  - Guia de Contribuição: contributing_guidelines.md
  - Gitflow do Projeto: gitflow.md
  - Histórias de Usuário:
      - Visão Geral: user_history.md
      - Catálogo e Modelagem: user_history/catalogo_modelagem.md
      - Busca, Navegação e Atendimento: user_history/busca_navegacao_atendimento.md
      - Estoque, Loja Física e Operação: user_history/estoque_loja_fisica_operacao.md
      - Compra, Pagamento e Entrega: user_history/compra_pagamento_entrega.md
      - Clientes, CRM e Marketing: user_history/clientes_crm_marketing.md
      - Fiscal, Trocas e Pós-venda: user_history/fiscal_trocas_pos_venda.md
      - Avaliações e Conteúdo Gerado pelo Usuário: user_history/avaliacoes_conteudo_gerado.md
      - Indicadores, Metas e Gamificação: user_history/indicadores_metas_gamificacao.md
  - Requisitos Não Funcionais: non_functional_requirements.md
